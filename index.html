<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta name="referrer" content="no-referrer">
    <title>Notes sécurisées</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #378add;
            --danger: #e24b4a;
            --success: #639922;
            --bg-light: #f5f5f5;
            --bg-dark: #ffffff;
            --text-primary: #2c2c2a;
            --text-secondary: #888780;
            --border: #d3d1c7;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
            color: var(--text-primary);
        }

        /* ── Écran de verrouillage ── */
        .lock-screen {
            display: none;
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }
        .lock-screen.show { display: flex; }

        .lock-card {
            background: white;
            border-radius: 20px;
            padding: 44px 40px;
            max-width: 380px;
            width: 90%;
            text-align: center;
            box-shadow: 0 30px 80px rgba(0,0,0,0.5);
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .lock-icon {
            width: 72px; height: 72px;
            background: var(--primary);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px;
            font-size: 30px; color: white;
            box-shadow: 0 8px 24px rgba(55,138,221,0.4);
        }
        .lock-card h2 { font-size: 20px; margin-bottom: 6px; color: var(--text-primary); }
        .lock-card p  { font-size: 13px; color: var(--text-secondary); margin-bottom: 24px; line-height: 1.5; }

        .lock-card input[type="password"] {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 20px;
            letter-spacing: 6px;
            text-align: center;
            margin-bottom: 10px;
            font-family: inherit;
            color: var(--text-primary);
            transition: all 0.3s;
        }
        .lock-card input[type="password"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(55,138,221,0.15);
        }
        .lock-card input:disabled { opacity: 0.6; }

        .lock-error   { color: var(--danger); font-size: 12px; min-height: 20px; margin-bottom: 10px; }
        .lock-attempts{ font-size: 11px; color: var(--danger); min-height: 16px; margin-top: 10px; }

        .lock-card .btn-primary {
            width: 100%; font-size: 15px; padding: 14px; margin-bottom: 18px;
        }
        .lock-card .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

        .lock-info {
            font-size: 11px; color: var(--text-secondary);
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .lock-info i { color: var(--success); }

        .change-pwd-link {
            font-size: 11px; color: var(--primary);
            cursor: pointer; margin-top: 12px;
            display: inline-block; text-decoration: underline;
        }

        /* ── En-tête app ── */
        .app-header {
            max-width: 1200px; margin: 0 auto 16px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .app-title {
            font-size: 15px; font-weight: 600; color: var(--text-secondary);
            display: flex; align-items: center; gap: 8px;
        }
        .app-title i { color: var(--primary); }

        .btn-lock {
            background: rgba(255,255,255,0.8);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 8px 14px; font-size: 13px; border-radius: 8px;
            cursor: pointer; display: flex; align-items: center; gap: 6px;
            transition: all 0.2s;
        }
        .btn-lock:hover { color: var(--danger); border-color: var(--danger); background: rgba(226,75,74,0.05); }

        /* ── Grille principale ── */
        .container {
            max-width: 1200px; margin: 0 auto;
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
        }
        @media (max-width: 900px) { .container { grid-template-columns: 1fr; } }

        .panel {
            background: var(--bg-dark); border-radius: 12px; padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: flex; flex-direction: column;
        }
        .panel-title {
            font-size: 18px; font-weight: 600; margin-bottom: 20px;
            display: flex; align-items: center; gap: 10px; color: var(--text-primary);
        }
        .panel-title i { color: var(--primary); font-size: 20px; }

        .input-group { display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px; }

        input[type="text"], textarea {
            padding: 12px 14px; border: 1px solid var(--border);
            border-radius: 8px; font-family: inherit; font-size: 14px;
            color: var(--text-primary); transition: all 0.3s;
        }
        input[type="text"]:focus, textarea:focus {
            outline: none; border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(55,138,221,0.1);
        }
        textarea { resize: vertical; min-height: 150px; line-height: 1.5; }

        button {
            padding: 12px 20px; border: none; border-radius: 8px;
            font-size: 14px; font-weight: 600; cursor: pointer;
            transition: all 0.3s; display: flex; align-items: center;
            justify-content: center; gap: 8px;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover {
            background: #2770c0; transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(55,138,221,0.3);
        }
        .btn-primary:active { transform: translateY(0); }
        .btn-secondary { background: transparent; border: 1px solid var(--border); color: var(--text-primary); }
        .btn-secondary:hover { background: var(--bg-light); }
        .btn-small { padding: 6px 12px; font-size: 12px; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-danger:hover { background: #c93a39; }

        .notes-list {
            flex: 1; overflow-y: auto; margin-bottom: 20px;
            display: flex; flex-direction: column; gap: 12px;
        }
        .notes-list::-webkit-scrollbar { width: 6px; }
        .notes-list::-webkit-scrollbar-track { background: var(--bg-light); border-radius: 10px; }
        .notes-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .category-group { margin-bottom: 16px; }
        .category-badge {
            display: inline-block; background: var(--primary); color: white;
            padding: 4px 12px; border-radius: 20px; font-size: 11px;
            font-weight: 600; margin-bottom: 8px;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .note-item {
            background: var(--bg-light); border: 1px solid var(--border);
            border-radius: 8px; padding: 12px; transition: all 0.3s;
            display: flex; justify-content: space-between;
            align-items: flex-start; gap: 12px;
        }
        .note-item:hover { border-color: var(--primary); box-shadow: 0 2px 8px rgba(55,138,221,0.15); }
        .note-content { flex: 1; min-width: 0; cursor: pointer; }
        .note-title { font-weight: 600; font-size: 14px; color: var(--text-primary); margin-bottom: 4px; word-break: break-word; }
        .note-preview {
            font-size: 12px; color: var(--text-secondary); line-height: 1.4;
            overflow: hidden; text-overflow: ellipsis;
            display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical;
            margin-bottom: 6px;
        }
        .note-meta { font-size: 11px; color: var(--text-secondary); }
        .note-actions { display: flex; gap: 4px; flex-shrink: 0; }

        .empty-state { text-align: center; padding: 40px 20px; color: var(--text-secondary); }
        .empty-state i { font-size: 48px; margin-bottom: 12px; opacity: 0.3; }
        .empty-state p { font-size: 14px; }

        .qa-section { border-top: 1px solid var(--border); padding-top: 16px; margin-top: 16px; }
        .qa-title {
            font-size: 14px; font-weight: 600; margin-bottom: 12px;
            display: flex; align-items: center; gap: 8px; color: var(--text-primary);
        }
        .qa-title i { color: var(--primary); }
        .qa-input-group { display: flex; gap: 8px; margin-bottom: 12px; }
        .qa-input-group input { flex: 1; margin: 0; }
        .qa-input-group button { padding: 12px 16px; flex-shrink: 0; }

        .response-area { max-height: 250px; overflow-y: auto; }
        .response-area::-webkit-scrollbar { width: 6px; }
        .response-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .response {
            background: var(--bg-light); border: 1px solid var(--border);
            border-left: 3px solid var(--primary); border-radius: 8px;
            padding: 12px; font-size: 13px; line-height: 1.6;
            color: var(--text-primary); white-space: pre-wrap; word-break: break-word;
        }
        .response.loading { color: var(--text-secondary); font-style: italic; }
        .response.error {
            border-left-color: var(--danger); background: rgba(226,75,74,0.05); color: var(--danger);
        }

        .modal {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.5); z-index: 1000;
            align-items: center; justify-content: center;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: var(--bg-dark); border-radius: 12px; padding: 24px;
            max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .modal-header {
            font-size: 18px; font-weight: 600; margin-bottom: 16px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .modal-close {
            background: none; border: none; font-size: 24px; cursor: pointer;
            color: var(--text-secondary); padding: 0; width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
        }
        .modal-close:hover { color: var(--text-primary); }
        .modal-body { line-height: 1.6; color: var(--text-primary); white-space: pre-wrap; word-break: break-word; }
        .modal-footer { margin-top: 20px; display: flex; gap: 12px; justify-content: flex-end; }

        .search-bar {
            display: flex; align-items: center; gap: 10px;
            background: var(--bg-light); border: 1px solid var(--border);
            border-radius: 8px; padding: 10px 14px; margin-bottom: 16px;
            transition: border-color 0.2s;
        }
        .search-bar:focus-within { border-color: var(--primary); }
        .search-bar i { color: var(--text-secondary); flex-shrink: 0; }
        .search-bar input {
            border: none; background: none; flex: 1; font-size: 14px;
            color: var(--text-primary); outline: none; font-family: inherit;
        }
        .search-count { font-size: 11px; color: var(--text-secondary); flex-shrink: 0; }
        mark {
            background: rgba(55,138,221,0.25); color: inherit;
            border-radius: 2px; padding: 0 1px;
        }
    </style>
</head>
<body>

    <!-- ══ Écran de verrouillage ══ -->
    <div class="lock-screen show" id="lockScreen">
        <div class="lock-card">
            <div class="lock-icon"><i class="fas fa-lock" id="lockIconEl"></i></div>
            <h2 id="lockTitle">Chargement…</h2>
            <p id="lockSubtitle"></p>
            <input
                type="password" id="lockInput"
                placeholder="••••••••" maxlength="128"
                autocomplete="current-password"
                onkeydown="if(event.key==='Enter') handleLock()"
            />
            <div class="lock-error" id="lockError"></div>
            <button class="btn-primary" id="lockBtn" onclick="handleLock()">
                <i class="fas fa-unlock-alt"></i> Déverrouiller
            </button>
            <div class="lock-info">
                <i class="fas fa-shield-alt"></i>
                Notes chiffrées AES-256 — données illisibles sans mot de passe
            </div>
            <div class="lock-attempts" id="lockAttempts"></div>
            <span class="change-pwd-link" id="changePwdLink" style="display:none" onclick="startChangePwd()">
                Changer de mot de passe
            </span>
        </div>
    </div>

    <!-- ══ Application principale ══ -->
    <div id="appContent" style="display:none">
        <div class="app-header">
            <div class="app-title">
                <i class="fas fa-shield-alt"></i> Notes sécurisées (AES-256)
            </div>
            <button class="btn-lock" onclick="lockApp()">
                <i class="fas fa-lock"></i> Verrouiller
            </button>
        </div>

        <div class="container">
            <div class="panel">
                <div class="panel-title"><i class="fas fa-pen-fancy"></i> Nouvelle note</div>
                <div class="input-group">
                    <input type="text" id="title" placeholder="Titre (optionnel)" />
                    <input type="text" id="category" placeholder="Catégorie (ex: Travail, Personnel, Étude)" />
                    <textarea id="noteText" placeholder="Tapez votre note ici..."></textarea>
                </div>
                <button class="btn-primary" onclick="addNote()">
                    <i class="fas fa-plus"></i> Ajouter la note
                </button>
            </div>

            <div class="panel">
                <div class="panel-title"><i class="fas fa-layer-group"></i> Vos notes</div>
                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input
                        type="text" id="searchInput"
                        placeholder="Rechercher dans vos notes…"
                        oninput="filterNotes()"
                        autocomplete="off"
                    />
                    <span id="searchCount" class="search-count"></span>
                </div>
                <div class="notes-list" id="notesList">
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <p>Aucune note. Commencez à en ajouter!</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal note complète -->
    <div class="modal" id="noteModal">
        <div class="modal-content">
            <div class="modal-header">
                <div>
                    <div id="modalTitle"></div>
                    <div style="font-size:12px;color:var(--text-secondary);margin-top:4px" id="modalCategory"></div>
                </div>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer">
                <button class="btn-danger" onclick="deleteNoteFromModal()">
                    <i class="fas fa-trash"></i> Supprimer
                </button>
                <button class="btn-secondary" onclick="closeModal()">Fermer</button>
            </div>
        </div>
    </div>

<script>
'use strict';

/* ════════════════════════════════════════════════════════════
   CRYPTOGRAPHIE  —  AES-256-GCM  +  PBKDF2-SHA-256
   Les notes sont chiffrées AVANT d'être écrites dans
   localStorage. Sans le mot de passe, elles sont illisibles.
════════════════════════════════════════════════════════════ */
const LS_SALT = 'ns_salt_v3';   // sel PBKDF2 (public, non secret)
const LS_DATA = 'ns_data_v3';   // notes chiffrées (base64)
const PBKDF2_ITER  = 100_000;
const LOCK_TIMEOUT = 5 * 60 * 1000;   // 5 min inactivité
const MAX_ATTEMPTS = 5;
const BLOCK_MS     = 2 * 60 * 1000;   // 2 min de blocage

let encKey         = null;   // CryptoKey AES-GCM en mémoire — null = verrouillé
let notes          = [];
let lockTimer      = null;
let failedAttempts = 0;
let blockedUntil   = 0;
let lockState      = 'unlock';  // machine d'états de l'écran
let tempPwd        = null;

// ── Utilitaires binaires ──
const enc = t => new TextEncoder().encode(t);
const dec = b => new TextDecoder().decode(b);
function toB64(buf) {
    return btoa(String.fromCharCode(...new Uint8Array(buf instanceof ArrayBuffer ? buf : buf.buffer)));
}
function fromB64(s) {
    return Uint8Array.from(atob(s), c => c.charCodeAt(0));
}

// ── Dérivation de clé (PBKDF2 → AES-256-GCM) ──
async function deriveKey(password, salt) {
    const raw = await crypto.subtle.importKey('raw', enc(password), { name: 'PBKDF2' }, false, ['deriveKey']);
    return crypto.subtle.deriveKey(
        { name: 'PBKDF2', salt, iterations: PBKDF2_ITER, hash: 'SHA-256' },
        raw,
        { name: 'AES-GCM', length: 256 },
        false, ['encrypt', 'decrypt']
    );
}

// ── Chiffrement AES-256-GCM ──
async function encryptData(data, key) {
    const iv  = crypto.getRandomValues(new Uint8Array(12));
    const ct  = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, enc(JSON.stringify(data)));
    const out = new Uint8Array(12 + ct.byteLength);
    out.set(iv);
    out.set(new Uint8Array(ct), 12);
    return toB64(out);
}

// ── Déchiffrement AES-256-GCM (lève une exception si mauvaise clé) ──
async function decryptData(b64str, key) {
    const buf = fromB64(b64str);
    const pt  = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: buf.slice(0, 12) }, key, buf.slice(12));
    return JSON.parse(dec(pt));
}

// ── Tenter un déverrouillage : retourne {key, notes} ou null ──
async function tryUnlock(password) {
    const saltB64 = localStorage.getItem(LS_SALT);
    if (!saltB64) return null;
    try {
        const key  = await deriveKey(password, fromB64(saltB64));
        const blob = localStorage.getItem(LS_DATA);
        if (!blob) return { key, notes: [] };
        const raw  = await decryptData(blob, key);
        // Migration : formats précédents (tableau direct ou {notes, apiKey})
        if (Array.isArray(raw)) return { key, notes: raw };
        return { key, notes: raw.notes || [] };
    } catch {
        return null;  // déchiffrement échoué = mauvais mot de passe
    }
}

// ── Créer un nouveau compte (premier lancement) ──
async function createAccount(password) {
    const salt = crypto.getRandomValues(new Uint8Array(16));
    localStorage.setItem(LS_SALT, toB64(salt));
    const key  = await deriveKey(password, salt);
    localStorage.setItem(LS_DATA, await encryptData([], key));
    localStorage.removeItem('notes');
    localStorage.removeItem('notes_pwd_hash_v2');
    return key;
}

// ── Changer de mot de passe (rechiffrement) ──
async function reencryptWithNewPassword(newPassword) {
    const salt = crypto.getRandomValues(new Uint8Array(16));
    localStorage.setItem(LS_SALT, toB64(salt));
    encKey = await deriveKey(newPassword, salt);
    localStorage.setItem(LS_DATA, await encryptData(notes, encKey));
}

// ── Sauvegarder les notes chiffrées ──
async function saveData() {
    if (!encKey) return;
    localStorage.setItem(LS_DATA, await encryptData(notes, encKey));
    localStorage.removeItem('notes');  // migration: purger l'ancien stockage en clair
}


/* ════════════════════════════════════════════════════════════
   INTERFACE DE VERROUILLAGE  —  machine d'états
════════════════════════════════════════════════════════════ */
const $  = id => document.getElementById(id);

function setLockUI({ icon = 'fa-lock', title, subtitle, btnHtml, error = '', attempts = '', showChangeLink = false }) {
    $('lockIconEl').className         = `fas ${icon}`;
    $('lockTitle').textContent        = title;
    $('lockSubtitle').textContent     = subtitle;
    $('lockBtn').innerHTML            = btnHtml;
    $('lockError').textContent        = error;
    $('lockAttempts').textContent     = attempts;
    $('changePwdLink').style.display  = showChangeLink ? 'inline-block' : 'none';
    $('lockInput').value              = '';
    $('lockBtn').disabled             = false;
    $('lockInput').disabled           = false;
    setTimeout(() => $('lockInput').focus(), 80);
}

function showLockScreen() {
    $('lockScreen').classList.add('show');
    $('appContent').style.display = 'none';
    clearTimeout(lockTimer);

    const isNew = !localStorage.getItem(LS_SALT);
    lockState   = isNew ? 'setup_1' : 'unlock';

    if (isNew) {
        setLockUI({
            icon: 'fa-key',
            title: 'Créer un mot de passe',
            subtitle: 'Choisissez un mot de passe pour chiffrer vos notes (min. 4 caractères).',
            btnHtml: '<i class="fas fa-key"></i> Continuer',
        });
    } else {
        setLockUI({
            icon: 'fa-lock',
            title: 'Application verrouillée',
            subtitle: 'Entrez votre mot de passe pour déchiffrer vos notes.',
            btnHtml: '<i class="fas fa-unlock-alt"></i> Déverrouiller',
            showChangeLink: true
        });
    }
}

function hideLockScreen() {
    $('lockScreen').classList.remove('show');
    $('appContent').style.display = 'block';
    resetLockTimer();
    renderNotes();
}

function lockApp() {
    encKey = null;
    notes  = [];
    clearTimeout(lockTimer);
    $('notesList').innerHTML = '';
    if ($('searchInput')) $('searchInput').value = '';
    if ($('searchCount')) $('searchCount').textContent = '';
    closeModal();
    showLockScreen();
}

function resetLockTimer() {
    clearTimeout(lockTimer);
    lockTimer = setTimeout(lockApp, LOCK_TIMEOUT);
}

function setLoading(on) {
    $('lockBtn').disabled  = on;
    $('lockInput').disabled = on;
    if (on) $('lockBtn').innerHTML = '<i class="fas fa-spinner fa-spin"></i> Chiffrement…';
}

async function handleLock() {
    const now = Date.now();
    if (now < blockedUntil) {
        $('lockError').textContent = `Accès bloqué. Réessayez dans ${Math.ceil((blockedUntil - now) / 1000)}s.`;
        return;
    }
    const pwd = $('lockInput').value;
    if (!pwd) { $('lockError').textContent = 'Veuillez entrer un mot de passe.'; return; }

    setLoading(true);
    try { await dispatch(pwd); }
    finally { setLoading(false); }
}

async function dispatch(pwd) {
    switch (lockState) {

        case 'unlock': {
            const r = await tryUnlock(pwd);
            if (r) {
                failedAttempts = 0;
                encKey = r.key;
                notes  = r.notes;
                hideLockScreen();
            } else {
                failedAttempts++;
                $('lockInput').value = '';
                if (failedAttempts >= MAX_ATTEMPTS) {
                    blockedUntil   = Date.now() + BLOCK_MS;
                    failedAttempts = 0;
                    $('lockError').textContent    = 'Trop de tentatives. Accès bloqué 2 minutes.';
                    $('lockAttempts').textContent = '';
                } else {
                    const left = MAX_ATTEMPTS - failedAttempts;
                    $('lockError').textContent    = 'Mot de passe incorrect.';
                    $('lockAttempts').textContent = `${left} tentative${left > 1 ? 's' : ''} restante${left > 1 ? 's' : ''}.`;
                }
            }
            break;
        }

        case 'setup_1': {
            if (pwd.length < 4) { $('lockError').textContent = 'Minimum 4 caractères requis.'; return; }
            tempPwd   = pwd;
            lockState = 'setup_2';
            setLockUI({
                icon: 'fa-key',
                title: 'Confirmez le mot de passe',
                subtitle: 'Saisissez à nouveau votre mot de passe pour confirmer.',
                btnHtml: '<i class="fas fa-check"></i> Confirmer'
            });
            break;
        }

        case 'setup_2': {
            if (pwd !== tempPwd) {
                tempPwd   = null;
                lockState = 'setup_1';
                setLockUI({
                    icon: 'fa-key',
                    title: 'Créer un mot de passe',
                    subtitle: 'Les mots de passe ne correspondent pas. Recommencez.',
                    btnHtml: '<i class="fas fa-key"></i> Continuer',
                    error: 'Les mots de passe ne correspondent pas.'
                });
                return;
            }
            encKey    = await createAccount(tempPwd);
            notes     = [];
            tempPwd   = null;
            hideLockScreen();
            break;
        }

        case 'change_0': {
            const r = await tryUnlock(pwd);
            if (!r) {
                $('lockError').textContent = 'Mot de passe actuel incorrect.';
                $('lockInput').value = '';
                return;
            }
            notes  = r.notes;
            lockState = 'change_1';
            setLockUI({
                icon: 'fa-key',
                title: 'Nouveau mot de passe',
                subtitle: 'Choisissez votre nouveau mot de passe (min. 4 caractères).',
                btnHtml: '<i class="fas fa-key"></i> Continuer'
            });
            break;
        }

        case 'change_1': {
            if (pwd.length < 4) { $('lockError').textContent = 'Minimum 4 caractères requis.'; return; }
            tempPwd   = pwd;
            lockState = 'change_2';
            setLockUI({
                icon: 'fa-key',
                title: 'Confirmer le nouveau mot de passe',
                subtitle: 'Saisissez à nouveau le nouveau mot de passe.',
                btnHtml: '<i class="fas fa-check"></i> Confirmer'
            });
            break;
        }

        case 'change_2': {
            if (pwd !== tempPwd) {
                tempPwd   = null;
                lockState = 'change_1';
                setLockUI({
                    icon: 'fa-key',
                    title: 'Nouveau mot de passe',
                    subtitle: 'Les mots de passe ne correspondent pas. Recommencez.',
                    btnHtml: '<i class="fas fa-key"></i> Continuer',
                    error: 'Les mots de passe ne correspondent pas.'
                });
                return;
            }
            await reencryptWithNewPassword(tempPwd);
            tempPwd   = null;
            hideLockScreen();
            break;
        }
    }
}

function startChangePwd() {
    lockState = 'change_0';
    setLockUI({
        icon: 'fa-key',
        title: 'Vérification',
        subtitle: 'Entrez votre mot de passe actuel pour continuer.',
        btnHtml: '<i class="fas fa-arrow-right"></i> Continuer'
    });
}

// Verrouiller dès que l'onglet passe en arrière-plan
document.addEventListener('visibilitychange', () => { if (document.hidden) lockApp(); });

// Réinitialiser le minuteur d'inactivité
['click', 'keydown', 'mousemove', 'touchstart'].forEach(ev =>
    document.addEventListener(ev, () => {
        if ($('appContent').style.display !== 'none') resetLockTimer();
    }, { passive: true })
);

// Démarrage
showLockScreen();


/* ════════════════════════════════════════════════════════════
   GESTION DES NOTES
════════════════════════════════════════════════════════════ */
let currentModalNoteId = null;

function escapeHtml(t) {
    const d = document.createElement('div');
    d.textContent = t;
    return d.innerHTML;
}

function formatNote(text) {
    return text.split('\n\n').map(p => p.trim()).filter(Boolean).join('\n\n');
}

function generateTitle(text) {
    const first = text.split('\n')[0].substring(0, 50);
    return first || 'Sans titre';
}

async function addNote() {
    const titleVal = $('title').value.trim();
    const cat      = $('category').value.trim() || 'Sans catégorie';
    const text     = formatNote($('noteText').value);
    if (!text) { alert('Veuillez entrer du texte.'); return; }

    notes.push({
        id:       Date.now(),
        title:    titleVal || generateTitle(text),
        category: cat,
        text,
        created:  new Date().toLocaleDateString('fr-FR')
    });
    await saveData();
    $('title').value = $('category').value = $('noteText').value = '';
    renderNotes();
}

async function deleteNote(id) {
    if (!confirm('Supprimer cette note ?')) return;
    notes = notes.filter(n => n.id !== id);
    await saveData();
    renderNotes();
}

async function deleteNoteFromModal() {
    await deleteNote(currentModalNoteId);
    closeModal();
}

function openNote(id) {
    const note = notes.find(n => n.id === id);
    if (!note) return;
    currentModalNoteId = id;
    $('modalTitle').textContent    = note.title;
    $('modalCategory').textContent = `📁 ${note.category} • ${note.created}`;
    $('modalBody').textContent     = note.text;
    $('noteModal').classList.add('show');
}

function closeModal() {
    $('noteModal').classList.remove('show');
    currentModalNoteId = null;
}

function renderNotes(filter = '') {
    const list = $('notesList');
    const filtered = filter
        ? notes.filter(n =>
            n.title.toLowerCase().includes(filter) ||
            n.text.toLowerCase().includes(filter) ||
            n.category.toLowerCase().includes(filter))
        : notes;

    if ($('searchCount')) {
        $('searchCount').textContent = filter && filtered.length !== notes.length
            ? `${filtered.length} / ${notes.length}` : '';
    }

    if (!filtered.length) {
        list.innerHTML = filter
            ? `<div class="empty-state"><i class="fas fa-search"></i><p>Aucun résultat pour « ${escapeHtml(filter)} »</p></div>`
            : `<div class="empty-state"><i class="fas fa-inbox"></i><p>Aucune note. Commencez à en ajouter!</p></div>`;
        return;
    }

    const grouped = {};
    filtered.forEach(n => { (grouped[n.category] ??= []).push(n); });
    list.innerHTML = Object.entries(grouped).map(([cat, items]) => `
        <div class="category-group">
            <div class="category-badge">${escapeHtml(cat)}</div>
            ${items.map(n => `
            <div class="note-item">
                <div class="note-content" onclick="openNote(${n.id})">
                    <div class="note-title">${highlightMatch(escapeHtml(n.title), filter)}</div>
                    <div class="note-preview">${highlightMatch(escapeHtml(n.text.substring(0, 100)), filter)}</div>
                    <div class="note-meta">${n.created}</div>
                </div>
                <div class="note-actions">
                    <button class="btn-secondary btn-small" onclick="deleteNote(${n.id})" title="Supprimer">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            </div>`).join('')}
        </div>`).join('');
}


/* ════════════════════════════════════════════════════════════
   RECHERCHE LOCALE  —  aucune communication réseau
════════════════════════════════════════════════════════════ */

function filterNotes() {
    renderNotes($('searchInput').value.trim().toLowerCase());
}

function highlightMatch(escapedHtml, filter) {
    if (!filter) return escapedHtml;
    const re = new RegExp(`(${filter.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
    return escapedHtml.replace(re, '<mark>$1</mark>');
}

$('noteModal').addEventListener('click', e => { if (e.target === $('noteModal')) closeModal(); });
</script>
