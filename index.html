<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta name="referrer" content="no-referrer">
    <title>Notes</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --blue:        #2563EB;
            --blue-hover:  #1D4ED8;
            --blue-tint:   rgba(37,99,235,0.08);
            --red:         #DC2626;
            --red-tint:    rgba(220,38,38,0.07);
            --amber:       #D97706;
            --amber-tint:  rgba(217,119,6,0.09);
            --green:       #16A34A;
            --ink:         #0F172A;
            --ink-2:       #334155;
            --ink-3:       #64748B;
            --ink-4:       #94A3B8;
            --line:        #E2E8F0;
            --surface:     #F8FAFC;
            --card:        #FFFFFF;
            --r:           10px;
            --r-sm:        7px;
            --shadow-xs:   0 1px 2px rgba(0,0,0,0.05);
            --shadow-sm:   0 1px 4px rgba(0,0,0,0.07), 0 2px 8px rgba(0,0,0,0.04);
            --shadow:      0 4px 16px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
            --shadow-lg:   0 20px 60px rgba(0,0,0,0.2), 0 4px 16px rgba(0,0,0,0.08);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--surface);
            min-height: 100vh;
            color: var(--ink);
            -webkit-font-smoothing: antialiased;
        }

        /* ─── LOCK SCREEN ─── */
        .lock-screen {
            display: none; position: fixed; inset: 0;
            background: #0C0F1A;
            z-index: 9999; align-items: center; justify-content: center;
        }
        .lock-screen.show { display: flex; }
        .lock-screen::before {
            content: '';
            position: absolute; inset: 0;
            background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(37,99,235,0.18) 0%, transparent 70%);
            pointer-events: none;
        }

        .lock-card {
            position: relative;
            background: var(--card);
            border-radius: 20px;
            padding: 52px 48px 44px;
            width: 100%; max-width: 388px;
            text-align: center;
            box-shadow: var(--shadow-lg);
            animation: appear .3s cubic-bezier(.22,1,.36,1);
        }
        @keyframes appear {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .lock-logo {
            width: 56px; height: 56px; border-radius: 14px;
            background: var(--ink);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 28px; color: white; font-size: 22px;
        }
        .lock-title    { font-size: 20px; font-weight: 700; color: var(--ink);   letter-spacing: -.3px; margin-bottom: 6px; }
        .lock-subtitle { font-size: 14px; color: var(--ink-3); margin-bottom: 28px; line-height: 1.5; }

        .lock-field {
            position: relative; margin-bottom: 10px;
            text-align: left;
        }
        .lock-field input {
            width: 100%; padding: 13px 44px 13px 14px;
            border: 1.5px solid var(--line);
            border-radius: var(--r-sm);
            font-family: inherit; font-size: 15px; color: var(--ink);
            background: var(--surface);
            transition: border-color .15s, box-shadow .15s;
            outline: none;
        }
        .lock-field input.pw { letter-spacing: 4px; }
        .lock-field input:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 3px var(--blue-tint);
            background: white;
        }
        .lock-field input::placeholder { letter-spacing: 0; color: var(--ink-4); }
        .lock-field input:disabled { opacity: .5; }
        .eye-btn {
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
            background: none; border: none; cursor: pointer;
            color: var(--ink-4); font-size: 15px; padding: 4px;
            transition: color .15s; display: none; line-height: 1;
        }
        .eye-btn.visible { display: block; }
        .eye-btn:hover { color: var(--ink-2); }

        .lock-error {
            font-size: 13px; font-weight: 500; color: var(--red);
            min-height: 20px; margin-bottom: 8px; text-align: left;
        }
        .lock-attempts { font-size: 12px; color: var(--ink-3); min-height: 18px; text-align: left; }

        .lock-btn {
            width: 100%; padding: 13px; margin-top: 4px; margin-bottom: 20px;
            background: var(--ink); color: white;
            border: none; border-radius: var(--r-sm);
            font-family: inherit; font-size: 15px; font-weight: 600;
            cursor: pointer; transition: background .15s, transform .1s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .lock-btn:hover:not(:disabled) { background: var(--ink-2); }
        .lock-btn:active:not(:disabled) { transform: scale(.99); }
        .lock-btn:disabled { opacity: .55; cursor: not-allowed; }

        .lock-footer { display: flex; justify-content: center; gap: 20px; }
        .lock-link {
            font-size: 13px; color: var(--ink-3); cursor: pointer;
            background: none; border: none; font-family: inherit;
            padding: 0; text-decoration: underline; text-underline-offset: 2px;
            transition: color .15s; display: none;
        }
        .lock-link:hover { color: var(--ink); }

        /* ─── APP SHELL ─── */
        .app { display: none; flex-direction: column; min-height: 100vh; }
        .app.show { display: flex; }

        .topbar {
            background: var(--card);
            border-bottom: 1px solid var(--line);
            padding: 0 24px;
            height: 56px;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 100;
        }
        .topbar-left { display: flex; align-items: center; gap: 12px; }
        .topbar-icon {
            width: 30px; height: 30px; border-radius: 8px; background: var(--ink);
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 13px; flex-shrink: 0;
        }
        .topbar-greeting {
            font-size: 14px; font-weight: 600; color: var(--ink);
            display: flex; align-items: center; gap: 6px;
        }
        .topbar-greeting span { color: var(--ink-2); }
        .btn-rename {
            background: none; border: none; cursor: pointer; color: var(--ink-4);
            font-size: 12px; padding: 3px 5px; transition: color .15s; line-height: 1;
        }
        .btn-rename:hover { color: var(--blue); }
        .name-inline-edit { display: none; align-items: center; gap: 6px; }
        .name-inline-edit.open { display: flex; }
        .name-inline-edit input {
            padding: 5px 10px; font-size: 13px; font-weight: 600;
            border: 1.5px solid var(--blue); border-radius: var(--r-sm);
            outline: none; background: white; color: var(--ink);
            box-shadow: 0 0 0 3px var(--blue-tint); width: 140px; font-family: inherit;
        }
        .name-inline-edit button {
            border: none; cursor: pointer; border-radius: 6px;
            padding: 5px 10px; font-size: 13px; font-family: inherit; transition: background .15s;
        }
        .ni-save   { background: var(--blue); color: white; }
        .ni-save:hover { background: var(--blue-hover); }
        .ni-cancel { background: var(--surface); color: var(--ink-3); border: 1px solid var(--line) !important; }

        .topbar-right { display: flex; gap: 8px; }
        .btn-tb {
            padding: 7px 14px; border-radius: var(--r-sm);
            background: none; border: 1px solid var(--line);
            font-family: inherit; font-size: 13px; font-weight: 500;
            color: var(--ink-2); cursor: pointer; transition: all .15s;
            display: flex; align-items: center; gap: 6px;
            box-shadow: var(--shadow-xs);
        }
        .btn-tb:hover { background: var(--surface); color: var(--red); border-color: currentColor; }

        /* ─── REMINDER BANNER ─── */
        .rem-bar {
            background: #FFFBEB;
            border-bottom: 1px solid #FDE68A;
            padding: 10px 24px;
            display: none; align-items: center; gap: 12px;
        }
        .rem-bar.show { display: flex; }
        .rem-bar-icon { color: var(--amber); font-size: 14px; flex-shrink: 0; }
        .rem-bar-msg  { flex: 1; font-size: 13px; color: var(--ink-2); }
        .rem-bar-msg strong { color: var(--ink); }
        .rem-bar-cta {
            padding: 5px 14px; border: none; border-radius: 6px;
            background: var(--amber); color: white;
            font-family: inherit; font-size: 12px; font-weight: 600;
            cursor: pointer; transition: background .15s; flex-shrink: 0;
        }
        .rem-bar-cta:hover { background: #B45309; }
        .rem-bar-close {
            background: none; border: none; cursor: pointer;
            color: var(--ink-4); font-size: 16px; line-height: 1; flex-shrink: 0;
        }

        /* ─── MAIN ─── */
        .main {
            flex: 1; padding: 24px;
            display: grid; grid-template-columns: 380px 1fr; gap: 20px;
            max-width: 1160px; margin: 0 auto; width: 100%;
        }
        @media (max-width: 860px) { .main { grid-template-columns: 1fr; } }

        .card {
            background: var(--card); border: 1px solid var(--line);
            border-radius: var(--r); padding: 24px;
            box-shadow: var(--shadow-sm);
        }
        .card-title {
            font-size: 13px; font-weight: 600; color: var(--ink-3);
            text-transform: uppercase; letter-spacing: .6px;
            margin-bottom: 18px;
        }

        /* ─── FORM ─── */
        .form-field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
        .form-label {
            font-size: 12px; font-weight: 500; color: var(--ink-3);
        }
        .form-field input[type="text"],
        .form-field input[type="date"],
        .form-field textarea {
            padding: 9px 12px;
            border: 1.5px solid var(--line); border-radius: var(--r-sm);
            font-family: inherit; font-size: 14px; color: var(--ink);
            background: white; outline: none; transition: border-color .15s, box-shadow .15s;
        }
        .form-field input:focus, .form-field textarea:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 3px var(--blue-tint);
        }
        .form-field textarea { resize: vertical; min-height: 110px; line-height: 1.6; }
        .form-field input[type="date"] { color: var(--ink); }

        .reminder-hint {
            font-size: 11px; color: var(--ink-4); margin-top: 3px;
        }

        .btn-add {
            width: 100%; padding: 11px; border: none; border-radius: var(--r-sm);
            background: var(--blue); color: white;
            font-family: inherit; font-size: 14px; font-weight: 600;
            cursor: pointer; transition: background .15s, transform .1s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            margin-top: 4px;
        }
        .btn-add:hover  { background: var(--blue-hover); }
        .btn-add:active { transform: scale(.99); }

        /* ─── NOTES PANEL ─── */
        .search-row {
            display: flex; align-items: center; gap: 10px;
            background: var(--surface); border: 1.5px solid var(--line);
            border-radius: var(--r-sm); padding: 9px 12px;
            margin-bottom: 16px; transition: border-color .15s, box-shadow .15s;
        }
        .search-row:focus-within {
            border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-tint);
        }
        .search-row i { color: var(--ink-4); font-size: 13px; flex-shrink: 0; }
        .search-row input {
            flex: 1; border: none; background: none; outline: none;
            font-family: inherit; font-size: 14px; color: var(--ink);
        }
        .search-row input::placeholder { color: var(--ink-4); }
        .search-clr {
            background: none; border: none; cursor: pointer; color: var(--ink-4);
            font-size: 15px; line-height: 1; display: none; padding: 0; transition: color .15s;
        }
        .search-clr.on { display: block; }
        .search-clr:hover { color: var(--red); }
        .search-cnt { font-size: 12px; color: var(--ink-4); font-weight: 500; flex-shrink: 0; }

        .notes-scroll { overflow-y: auto; max-height: 560px; display: flex; flex-direction: column; gap: 2px; }
        .notes-scroll::-webkit-scrollbar { width: 4px; }
        .notes-scroll::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }

        .cat-row {
            font-size: 11px; font-weight: 600; color: var(--ink-4);
            text-transform: uppercase; letter-spacing: .8px;
            padding: 12px 2px 6px; display: flex; align-items: center; gap: 8px;
        }
        .cat-row::after { content:''; flex:1; height:1px; background: var(--line); }

        .note-row {
            display: flex; align-items: flex-start; gap: 10px;
            padding: 11px 12px; border-radius: var(--r-sm);
            cursor: pointer; transition: background .12s; border: 1px solid transparent;
        }
        .note-row:hover { background: var(--surface); border-color: var(--line); }
        .note-row-body { flex: 1; min-width: 0; }
        .note-row-title {
            font-size: 14px; font-weight: 600; color: var(--ink);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px;
        }
        .note-row-preview {
            font-size: 12px; color: var(--ink-3); line-height: 1.4;
            overflow: hidden; text-overflow: ellipsis;
            display: -webkit-box; -webkit-line-clamp: 1; line-clamp: 1; -webkit-box-orient: vertical;
            margin-bottom: 5px;
        }
        .note-row-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .note-row-date { font-size: 11px; color: var(--ink-4); }

        .rbadge {
            font-size: 11px; font-weight: 500;
            display: inline-flex; align-items: center; gap: 3px;
            padding: 1px 7px; border-radius: 20px;
        }
        .rbadge.future  { background: #EFF6FF; color: var(--blue); }
        .rbadge.today   { background: #FFFBEB; color: var(--amber); animation: blink 2.5s ease infinite; }
        .rbadge.overdue { background: #FEF2F2; color: var(--red); }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.5} }

        .note-del {
            background: none; border: none; cursor: pointer;
            color: var(--ink-4); font-size: 13px; padding: 4px;
            border-radius: 6px; transition: all .15s; flex-shrink: 0;
            opacity: 0;
        }
        .note-row:hover .note-del { opacity: 1; }
        .note-del:hover { background: var(--red-tint); color: var(--red); }

        .empty {
            text-align: center; padding: 48px 20px; color: var(--ink-4);
        }
        .empty svg { width: 40px; height: 40px; margin-bottom: 14px; opacity: .3; }
        .empty p { font-size: 14px; line-height: 1.6; }

        /* ─── MODALS ─── */
        .overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(15,23,42,.4); z-index: 200;
            align-items: center; justify-content: center;
            backdrop-filter: blur(3px);
        }
        .overlay.show { display: flex; }
        .modal {
            background: var(--card); border: 1px solid var(--line);
            border-radius: var(--r); padding: 28px;
            width: 90%; max-width: 560px; max-height: 80vh; overflow-y: auto;
            box-shadow: var(--shadow-lg);
            animation: appear .2s cubic-bezier(.22,1,.36,1);
        }
        .modal-sm { max-width: 420px; }
        .modal-hd {
            display: flex; justify-content: space-between; align-items: flex-start;
            gap: 16px; margin-bottom: 16px;
        }
        .modal-ttl { font-size: 17px; font-weight: 700; color: var(--ink); letter-spacing: -.2px; }
        .modal-sub { font-size: 12px; color: var(--ink-3); margin-top: 4px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .modal-x {
            width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
            background: var(--surface); border: 1px solid var(--line);
            display: flex; align-items: center; justify-content: center;
            font-size: 15px; color: var(--ink-3); cursor: pointer; transition: all .15s;
        }
        .modal-x:hover { background: var(--red-tint); color: var(--red); border-color: var(--red); }
        .modal-body { font-size: 14px; line-height: 1.8; color: var(--ink-2); white-space: pre-wrap; word-break: break-word; }
        .modal-ft { margin-top: 20px; display: flex; gap: 8px; justify-content: flex-end; }
        .btn-ghost {
            padding: 8px 16px; border-radius: var(--r-sm);
            background: none; border: 1px solid var(--line);
            font-family: inherit; font-size: 13px; font-weight: 500;
            color: var(--ink-2); cursor: pointer; transition: all .15s;
        }
        .btn-ghost:hover { background: var(--surface); }
        .btn-del {
            padding: 8px 16px; border-radius: var(--r-sm);
            background: var(--red-tint); border: 1px solid rgba(220,38,38,.2);
            font-family: inherit; font-size: 13px; font-weight: 500;
            color: var(--red); cursor: pointer; transition: all .15s;
            display: flex; align-items: center; gap: 6px;
        }
        .btn-del:hover { background: var(--red); color: white; }

        /* reminder modal */
        .rem-item {
            display: flex; align-items: flex-start; gap: 12px;
            padding: 12px; border-radius: var(--r-sm); margin-bottom: 6px;
            cursor: pointer; border: 1px solid var(--line); transition: background .12s;
        }
        .rem-item:hover { background: var(--surface); }
        .rem-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
        .rem-item.today   .rem-dot { background: var(--amber); }
        .rem-item.overdue .rem-dot { background: var(--red); }
        .rem-item-ttl { font-size: 14px; font-weight: 600; color: var(--ink); }
        .rem-item-when { font-size: 12px; color: var(--ink-3); margin-top: 2px; }

        mark { background: rgba(37,99,235,.15); color: inherit; border-radius: 2px; }
    </style>
</head>
<body>

<!-- ══ Lock screen ══ -->
<div class="lock-screen show" id="lockScreen">
    <div class="lock-card">
        <div class="lock-logo"><i class="fas fa-lock" id="lockIconEl"></i></div>
        <div class="lock-title"    id="lockTitle">Notes</div>
        <div class="lock-subtitle" id="lockSubtitle"></div>

        <div class="lock-field">
            <input id="lockInput" maxlength="128"
                   onkeydown="if(event.key==='Enter') handleLock()" />
            <button class="eye-btn" id="eyeBtn" type="button" onclick="togglePwd()" tabindex="-1">
                <i class="fas fa-eye" id="eyeIcon"></i>
            </button>
        </div>

        <div class="lock-error"    id="lockError"></div>
        <div class="lock-attempts" id="lockAttempts"></div>

        <button class="lock-btn" id="lockBtn" onclick="handleLock()">Continuer</button>

        <div class="lock-footer">
            <button class="lock-link" id="changePwdLink" onclick="startChangePwd()">
                Changer de mot de passe
            </button>
        </div>
    </div>
</div>

<!-- ══ App ══ -->
<div class="app" id="appContent">

    <header class="topbar">
        <div class="topbar-left">
            <div class="topbar-icon"><i class="fas fa-lock"></i></div>
            <div id="greetingDisplay" class="topbar-greeting">
                <span id="appUserName"></span>
                <button class="btn-rename" onclick="startRename()" title="Modifier le prénom">
                    <i class="fas fa-pencil-alt"></i>
                </button>
            </div>
            <div class="name-inline-edit" id="nameEdit">
                <input type="text" id="nameInput" maxlength="30" placeholder="Prénom"
                       onkeydown="if(event.key==='Enter') saveRename(); if(event.key==='Escape') cancelRename()" />
                <button class="ni-save"   onclick="saveRename()"><i class="fas fa-check"></i></button>
                <button class="ni-cancel" onclick="cancelRename()"><i class="fas fa-times"></i></button>
            </div>
        </div>
        <div class="topbar-right">
            <button class="btn-tb" onclick="lockApp()">
                <i class="fas fa-lock"></i> Verrouiller
            </button>
        </div>
    </header>

    <div class="rem-bar" id="remBar">
        <i class="fas fa-bell rem-bar-icon"></i>
        <div class="rem-bar-msg" id="remBarMsg"></div>
        <button class="rem-bar-cta" onclick="openRemModal()">Afficher</button>
        <button class="rem-bar-close" onclick="$('remBar').classList.remove('show')">&times;</button>
    </div>

    <div class="main">

        <!-- New note -->
        <div class="card">
            <div class="card-title">Nouvelle note</div>

            <div class="form-field">
                <label class="form-label">Titre</label>
                <input type="text" id="title" placeholder="Titre de la note" />
            </div>
            <div class="form-field">
                <label class="form-label">Catégorie</label>
                <input type="text" id="category" placeholder="Travail, Personnel, Études…" />
            </div>
            <div class="form-field">
                <label class="form-label">Contenu</label>
                <textarea id="noteText" placeholder="Commencez à écrire…"></textarea>
            </div>
            <div class="form-field">
                <label class="form-label">Rappel</label>
                <input type="date" id="reminderDate" />
                <span class="reminder-hint">Vous serez averti à l'ouverture de l'application.</span>
            </div>

            <button class="btn-add" onclick="addNote()">
                <i class="fas fa-plus"></i> Ajouter
            </button>
        </div>

        <!-- Notes list -->
        <div class="card">
            <div class="card-title">Mes notes</div>

            <div class="search-row">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Rechercher…"
                       oninput="filterNotes()" autocomplete="off" />
                <button class="search-clr" id="searchClr" onclick="clearSearch()">&times;</button>
                <span id="searchCnt" class="search-cnt"></span>
            </div>

            <div class="notes-scroll" id="notesList">
                <div class="empty">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" />
                    </svg>
                    <p>Aucune note pour l'instant.<br>Créez votre première note.</p>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- Note detail overlay -->
<div class="overlay" id="noteOverlay">
    <div class="modal">
        <div class="modal-hd">
            <div>
                <div class="modal-ttl" id="modalTitle"></div>
                <div class="modal-sub" id="modalSub"></div>
            </div>
            <button class="modal-x" onclick="closeNote()">&times;</button>
        </div>
        <div class="modal-body" id="modalBody"></div>
        <div class="modal-ft">
            <button class="btn-del" onclick="deleteFromModal()">
                <i class="fas fa-trash"></i> Supprimer
            </button>
            <button class="btn-ghost" onclick="closeNote()">Fermer</button>
        </div>
    </div>
</div>

<!-- Reminders overlay -->
<div class="overlay" id="remOverlay">
    <div class="modal modal-sm">
        <div class="modal-hd">
            <div class="modal-ttl">Rappels</div>
            <button class="modal-x" onclick="closeRemModal()">&times;</button>
        </div>
        <div id="remList"></div>
        <div class="modal-ft">
            <button class="btn-ghost" onclick="closeRemModal()">Fermer</button>
        </div>
    </div>
</div>

<script>
'use strict';

/* ── Crypto constants ── */
const LS_SALT = 'ns_salt_v3';
const LS_DATA = 'ns_data_v4';
const LS_NAME = 'ns_name';
const PBKDF2_ITER  = 100_000;
const LOCK_TIMEOUT = 5 * 60 * 1000;
const MAX_ATTEMPTS = 5;
const BLOCK_MS     = 2 * 60 * 1000;

let encKey = null, notes = [], userName = '';
let lockTimer, failedAttempts = 0, blockedUntil = 0;
let lockState = 'unlock', tempPwd = null, tempName = null;

/* ── Binary utils ── */
const enc = t => new TextEncoder().encode(t);
const dec = b => new TextDecoder().decode(b);
const toB64 = buf => btoa(String.fromCharCode(...new Uint8Array(buf instanceof ArrayBuffer ? buf : buf.buffer)));
const fromB64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));

async function deriveKey(pw, salt) {
    const raw = await crypto.subtle.importKey('raw', enc(pw), { name:'PBKDF2' }, false, ['deriveKey']);
    return crypto.subtle.deriveKey(
        { name:'PBKDF2', salt, iterations:PBKDF2_ITER, hash:'SHA-256' },
        raw, { name:'AES-GCM', length:256 }, false, ['encrypt','decrypt']
    );
}
async function encryptData(data, key) {
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const ct = await crypto.subtle.encrypt({ name:'AES-GCM', iv }, key, enc(JSON.stringify(data)));
    const out = new Uint8Array(12 + ct.byteLength);
    out.set(iv); out.set(new Uint8Array(ct), 12);
    return toB64(out);
}
async function decryptData(b64, key) {
    const buf = fromB64(b64);
    const pt  = await crypto.subtle.decrypt({ name:'AES-GCM', iv:buf.slice(0,12) }, key, buf.slice(12));
    return JSON.parse(dec(pt));
}

async function tryUnlock(pw) {
    const saltB64 = localStorage.getItem(LS_SALT);
    if (!saltB64) return null;
    try {
        const key = await deriveKey(pw, fromB64(saltB64));
        for (const k of [LS_DATA, 'ns_data_v3']) {
            const blob = localStorage.getItem(k);
            if (!blob) continue;
            const raw = await decryptData(blob, key);
            return { key, notes: Array.isArray(raw) ? raw : (raw.notes || []), userName: Array.isArray(raw) ? '' : (raw.userName || '') };
        }
        return { key, notes: [], userName: '' };
    } catch { return null; }
}

async function createAccount(pw, name) {
    const salt = crypto.getRandomValues(new Uint8Array(16));
    localStorage.setItem(LS_SALT, toB64(salt));
    const key = await deriveKey(pw, salt);
    localStorage.setItem(LS_DATA, await encryptData({ notes:[], userName:name }, key));
    localStorage.setItem(LS_NAME, name);
    ['notes','notes_pwd_hash_v2','ns_data_v3'].forEach(k => localStorage.removeItem(k));
    return key;
}

async function reencrypt(pw) {
    const salt = crypto.getRandomValues(new Uint8Array(16));
    localStorage.setItem(LS_SALT, toB64(salt));
    encKey = await deriveKey(pw, salt);
    localStorage.setItem(LS_DATA, await encryptData({ notes, userName }, encKey));
}

async function save() {
    if (!encKey) return;
    localStorage.setItem(LS_DATA, await encryptData({ notes, userName }, encKey));
    localStorage.removeItem('notes');
}

/* ── Lock screen ── */
const $ = id => document.getElementById(id);

function setUI({ icon='fa-lock', title, sub, btn, err='', att='', showChange=false, textMode=false }) {
    $('lockIconEl').className         = `fas ${icon}`;
    $('lockTitle').textContent        = title;
    $('lockSubtitle').textContent     = sub;
    $('lockBtn').textContent          = btn;
    $('lockError').textContent        = err;
    $('lockAttempts').textContent     = att;
    $('changePwdLink').style.display  = showChange ? 'inline' : 'none';
    $('lockInput').type               = textMode ? 'text' : 'password';
    $('lockInput').className          = textMode ? '' : 'pw';
    $('lockInput').placeholder        = textMode ? 'Votre prénom' : '';
    $('lockInput').autocomplete       = textMode ? 'given-name' : 'current-password';
    $('lockInput').value              = '';
    $('lockBtn').disabled             = false;
    $('lockInput').disabled           = false;
    $('eyeBtn').classList.toggle('visible', !textMode);
    $('eyeIcon').className            = 'fas fa-eye';
    setTimeout(() => $('lockInput').focus(), 60);
}

function showLockScreen() {
    $('lockScreen').classList.add('show');
    $('appContent').classList.remove('show');
    clearTimeout(lockTimer);
    const isNew = !localStorage.getItem(LS_SALT);
    const name  = localStorage.getItem(LS_NAME);
    if (isNew) {
        lockState = 'setup_name';
        setUI({ icon:'fa-user', title:'Bienvenue', sub:'Comment vous appelez-vous ?', btn:'Continuer', textMode:true });
    } else {
        lockState = 'unlock';
        setUI({ icon:'fa-lock', title: name ? `Bon retour, ${name}` : 'Notes', sub:'Entrez votre mot de passe.', btn:'Déverrouiller', showChange:true });
    }
}

function hideLockScreen() {
    $('lockScreen').classList.remove('show');
    $('appContent').classList.add('show');
    $('appUserName').textContent = userName || 'Mes notes';
    resetTimer();
    render();
    checkReminders();
}

function lockApp() {
    encKey = null; notes = []; userName = '';
    clearTimeout(lockTimer);
    $('notesList').innerHTML = '';
    $('remBar').classList.remove('show');
    if ($('searchInput')) { $('searchInput').value = ''; $('searchCnt').textContent = ''; }
    $('searchClr')?.classList.remove('on');
    closeNote(); closeRemModal();
    showLockScreen();
}

function resetTimer() {
    clearTimeout(lockTimer);
    lockTimer = setTimeout(lockApp, LOCK_TIMEOUT);
}

function setBusy(on) {
    $('lockBtn').disabled   = on;
    $('lockInput').disabled = on;
    if (on) $('lockBtn').textContent = 'Chargement…';
}

async function handleLock() {
    const now = Date.now();
    if (now < blockedUntil) {
        $('lockError').textContent = `Trop de tentatives. Réessayez dans ${Math.ceil((blockedUntil-now)/1000)} s.`;
        return;
    }
    const val = $('lockInput').value;
    if (!val.trim()) { $('lockError').textContent = 'Ce champ est requis.'; return; }
    setBusy(true);
    try { await dispatch(val); } finally { setBusy(false); }
}

async function dispatch(val) {
    switch (lockState) {
        case 'setup_name':
            if (!val.trim()) { $('lockError').textContent = 'Veuillez entrer votre prénom.'; return; }
            tempName = val.trim(); lockState = 'setup_1';
            setUI({ icon:'fa-key', title:`Bonjour, ${tempName}`, sub:'Créez un mot de passe pour protéger vos notes (min. 4 caractères).', btn:'Continuer' });
            break;

        case 'setup_1':
            if (val.length < 4) { $('lockError').textContent = 'Minimum 4 caractères.'; return; }
            tempPwd = val; lockState = 'setup_2';
            setUI({ icon:'fa-key', title:'Confirmez', sub:'Saisissez à nouveau votre mot de passe.', btn:'Créer mon espace' });
            break;

        case 'setup_2':
            if (val !== tempPwd) {
                tempPwd = null; lockState = 'setup_1';
                setUI({ icon:'fa-key', title:`Bonjour, ${tempName}`, sub:'Les mots de passe ne correspondent pas. Réessayez.', btn:'Continuer', err:'Mots de passe différents.' });
                return;
            }
            encKey = await createAccount(tempPwd, tempName);
            notes = []; userName = tempName; tempPwd = tempName = null;
            hideLockScreen();
            break;

        case 'unlock': {
            const r = await tryUnlock(val);
            if (r) {
                failedAttempts = 0;
                encKey = r.key; notes = r.notes;
                userName = r.userName || localStorage.getItem(LS_NAME) || '';
                if (userName) localStorage.setItem(LS_NAME, userName);
                hideLockScreen();
            } else {
                failedAttempts++;
                $('lockInput').value = '';
                if (failedAttempts >= MAX_ATTEMPTS) {
                    blockedUntil = Date.now() + BLOCK_MS; failedAttempts = 0;
                    $('lockError').textContent = 'Accès temporairement bloqué (2 minutes).';
                } else {
                    const left = MAX_ATTEMPTS - failedAttempts;
                    $('lockError').textContent = 'Mot de passe incorrect.';
                    $('lockAttempts').textContent = `${left} essai${left>1?'s':''} restant${left>1?'s':''}.`;
                }
            }
            break;
        }

        case 'change_0': {
            const r = await tryUnlock(val);
            if (!r) { $('lockError').textContent = 'Mot de passe actuel incorrect.'; $('lockInput').value=''; return; }
            notes = r.notes; lockState = 'change_1';
            setUI({ icon:'fa-key', title:'Nouveau mot de passe', sub:'Choisissez un nouveau mot de passe (min. 4 caractères).', btn:'Continuer' });
            break;
        }
        case 'change_1':
            if (val.length < 4) { $('lockError').textContent = 'Minimum 4 caractères.'; return; }
            tempPwd = val; lockState = 'change_2';
            setUI({ icon:'fa-key', title:'Confirmez', sub:'Saisissez à nouveau le nouveau mot de passe.', btn:'Enregistrer' });
            break;

        case 'change_2':
            if (val !== tempPwd) {
                tempPwd = null; lockState = 'change_1';
                setUI({ icon:'fa-key', title:'Nouveau mot de passe', sub:'Mots de passe différents. Réessayez.', btn:'Continuer', err:'Mots de passe différents.' });
                return;
            }
            await reencrypt(tempPwd); tempPwd = null;
            hideLockScreen();
            break;
    }
}

function startChangePwd() {
    lockState = 'change_0';
    setUI({ icon:'fa-key', title:'Vérification', sub:'Entrez votre mot de passe actuel.', btn:'Vérifier' });
}

function togglePwd() {
    const i = $('lockInput'), hidden = i.type === 'password';
    i.type = hidden ? 'text' : 'password';
    i.classList.toggle('pw', !hidden);
    $('eyeIcon').className = hidden ? 'fas fa-eye-slash' : 'fas fa-eye';
}

document.addEventListener('visibilitychange', () => { if (document.hidden) lockApp(); });
['click','keydown','mousemove','touchstart'].forEach(e =>
    document.addEventListener(e, () => { if ($('appContent').classList.contains('show')) resetTimer(); }, { passive:true })
);
showLockScreen();

/* ── Notes ── */
let openNoteId = null;

const esc = t => { const d=document.createElement('div'); d.textContent=t; return d.innerHTML; };

function fmtDate(iso) {
    if (!iso) return '';
    if (iso.includes('-')) { const [y,m,d]=iso.split('-'); return `${d}/${m}/${y}`; }
    return iso;
}
function rStatus(iso) {
    if (!iso) return null;
    const t = new Date().toISOString().split('T')[0];
    return iso < t ? 'overdue' : iso === t ? 'today' : 'future';
}
function rLabel(s) { return s==='overdue' ? 'En retard' : s==='today' ? "Aujourd'hui" : 'À venir'; }

async function addNote() {
    const title    = $('title').value.trim();
    const cat      = $('category').value.trim() || 'Général';
    const text     = $('noteText').value.trim();
    const reminder = $('reminderDate').value || null;
    if (!text) { $('noteText').focus(); return; }
    notes.push({
        id:           Date.now(),
        title:        title || text.split('\n')[0].substring(0,50) || 'Sans titre',
        category:     cat, text,
        created:      new Date().toISOString().split('T')[0],
        reminderDate: reminder
    });
    await save();
    ['title','category','noteText','reminderDate'].forEach(id => $(id).value='');
    filterNotes();
    $('noteText').focus();
}

async function deleteNote(id) {
    if (!confirm('Supprimer cette note ?')) return;
    notes = notes.filter(n => n.id !== id);
    await save();
    filterNotes();
}

async function deleteFromModal() {
    await deleteNote(openNoteId);
    closeNote();
}

function openNote(id) {
    const n = notes.find(n => n.id === id);
    if (!n) return;
    openNoteId = id;
    $('modalTitle').textContent = n.title;
    const rs = rStatus(n.reminderDate);
    const badge = rs ? `<span class="rbadge ${rs}"><i class="fas fa-bell"></i> ${fmtDate(n.reminderDate)} — ${rLabel(rs)}</span>` : '';
    $('modalSub').innerHTML = `<span>${esc(n.category)}</span><span>·</span><span>${fmtDate(n.created)}</span>${badge ? '<span>·</span>'+badge : ''}`;
    $('modalBody').textContent = n.text;
    $('noteOverlay').classList.add('show');
}

function closeNote() { $('noteOverlay').classList.remove('show'); openNoteId=null; }

/* ── Reminders ── */
function checkReminders() {
    const t = new Date().toISOString().split('T')[0];
    const due = notes.filter(n => n.reminderDate && n.reminderDate <= t);
    if (!due.length) return;
    const today   = due.filter(n => n.reminderDate === t).length;
    const overdue = due.filter(n => n.reminderDate <  t).length;
    let msg = today && overdue
        ? `<strong>${today}</strong> aujourd'hui · <strong>${overdue}</strong> en retard`
        : today
        ? `<strong>${today}</strong> rappel${today>1?'s':''} pour aujourd'hui`
        : `<strong>${overdue}</strong> rappel${overdue>1?'s':''} en retard`;
    $('remBarMsg').innerHTML = msg;
    $('remBar').classList.add('show');
}

function openRemModal() {
    const t = new Date().toISOString().split('T')[0];
    const due = notes.filter(n => n.reminderDate && n.reminderDate <= t);
    $('remList').innerHTML = due.map(n => {
        const s = rStatus(n.reminderDate);
        return `<div class="rem-item ${s}" onclick="closeRemModal(); openNote(${n.id})">
            <div class="rem-dot"></div>
            <div>
                <div class="rem-item-ttl">${esc(n.title)}</div>
                <div class="rem-item-when">${s==='today' ? "Aujourd'hui" : 'En retard — '+fmtDate(n.reminderDate)}</div>
            </div>
        </div>`;
    }).join('');
    $('remOverlay').classList.add('show');
    $('remBar').classList.remove('show');
}
function closeRemModal() { $('remOverlay').classList.remove('show'); }

/* ── Search + render ── */
function filterNotes() {
    const q = $('searchInput').value.trim().toLowerCase();
    $('searchClr').classList.toggle('on', q.length > 0);
    render(q);
}
function clearSearch() { $('searchInput').value=''; filterNotes(); }

function hl(html, q) {
    if (!q) return html;
    return html.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'), '<mark>$1</mark>');
}

function render(q='') {
    const list = $('notesList');
    const items = q ? notes.filter(n =>
        n.title.toLowerCase().includes(q) ||
        n.text.toLowerCase().includes(q)  ||
        n.category.toLowerCase().includes(q)) : notes;

    $('searchCnt').textContent = q && items.length!==notes.length ? `${items.length} / ${notes.length}` : '';

    if (!items.length) {
        list.innerHTML = q
            ? `<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path stroke-linecap="round" d="M21 21l-4.35-4.35"/></svg><p>Aucun résultat pour « ${esc(q)} »</p></div>`
            : `<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/></svg><p>Aucune note pour l'instant.<br>Créez votre première note.</p></div>`;
        return;
    }

    const grouped = {};
    items.forEach(n => { (grouped[n.category]??=[]).push(n); });

    list.innerHTML = Object.entries(grouped).map(([cat, arr]) => `
        <div class="cat-row">${esc(cat)}</div>
        ${arr.map(n => {
            const rs = rStatus(n.reminderDate);
            const badge = rs ? `<span class="rbadge ${rs}"><i class="fas fa-bell"></i> ${fmtDate(n.reminderDate)}</span>` : '';
            return `<div class="note-row" onclick="openNote(${n.id})">
                <div class="note-row-body">
                    <div class="note-row-title">${hl(esc(n.title), q)}</div>
                    <div class="note-row-preview">${hl(esc(n.text.substring(0,80)), q)}</div>
                    <div class="note-row-meta">
                        <span class="note-row-date">${fmtDate(n.created)}</span>
                        ${badge}
                    </div>
                </div>
                <button class="note-del" onclick="event.stopPropagation(); deleteNote(${n.id})" title="Supprimer">
                    <i class="fas fa-trash"></i>
                </button>
            </div>`;
        }).join('')}
    `).join('');
}

/* ── Rename ── */
function startRename() {
    $('nameInput').value = userName;
    $('greetingDisplay').style.display = 'none';
    $('nameEdit').classList.add('open');
    $('nameInput').focus(); $('nameInput').select();
}
function cancelRename() {
    $('nameEdit').classList.remove('open');
    $('greetingDisplay').style.display = '';
}
async function saveRename() {
    const v = $('nameInput').value.trim();
    if (!v) return;
    userName = v;
    localStorage.setItem(LS_NAME, v);
    await save();
    $('appUserName').textContent = v;
    cancelRename();
}

/* ── Close on backdrop click ── */
$('noteOverlay').addEventListener('click', e => { if(e.target===$('noteOverlay')) closeNote(); });
$('remOverlay').addEventListener('click',  e => { if(e.target===$('remOverlay'))  closeRemModal(); });
</script>
</body>
