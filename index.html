<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta name="referrer" content="no-referrer">
    <title>Notes</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            /* Zinc scale */
            --z-950: #09090B;
            --z-900: #18181B;
            --z-800: #27272A;
            --z-700: #3F3F46;
            --z-500: #71717A;
            --z-400: #A1A1AA;
            --z-300: #D4D4D8;
            --z-200: #E4E4E7;
            --z-100: #F4F4F5;
            --z-50:  #FAFAFA;

            /* Accent */
            --blue:       #2563EB;
            --blue-dark:  #1D4ED8;
            --blue-faint: rgba(37,99,235,0.07);
            --blue-ring:  rgba(37,99,235,0.2);

            /* Status */
            --red:        #DC2626;
            --red-faint:  rgba(220,38,38,0.07);
            --amber:      #D97706;
            --amber-faint:rgba(217,119,6,0.08);
            --green:      #16A34A;

            /* Radius */
            --r:    10px;
            --r-sm: 6px;
            --r-xs: 4px;

            /* Shadows */
            --sh-xs: 0 1px 2px rgba(0,0,0,0.04);
            --sh-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --sh:    0 4px 8px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
            --sh-xl: 0 32px 80px rgba(0,0,0,0.22), 0 8px 24px rgba(0,0,0,0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--z-100);
            min-height: 100vh;
            color: var(--z-900);
            -webkit-font-smoothing: antialiased;
        }

        /* ══════════════════════════════
           LOCK SCREEN
        ══════════════════════════════ */
        .lock-screen {
            display: none; position: fixed; inset: 0;
            background: #08080F;
            z-index: 9999;
            align-items: center; justify-content: center;
        }
        .lock-screen::after {
            content: '';
            position: absolute; inset: 0;
            background: radial-gradient(ellipse 70% 50% at 50% -10%, rgba(37,99,235,0.15) 0%, transparent 65%);
            pointer-events: none;
        }
        .lock-screen.show { display: flex; }

        .lock-card {
            position: relative; z-index: 1;
            background: #FFFFFF;
            border-radius: 18px;
            padding: 48px 44px 40px;
            width: 100%; max-width: 360px;
            text-align: center;
            box-shadow: var(--sh-xl);
            animation: rise .28s cubic-bezier(.22,1,.36,1);
        }
        @keyframes rise {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .lock-icon-wrap {
            width: 52px; height: 52px; border-radius: 13px;
            background: var(--z-950);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 24px; color: white; font-size: 20px;
        }
        .lock-title {
            font-size: 22px; font-weight: 700; letter-spacing: -.4px;
            color: var(--z-950); margin-bottom: 24px;
        }
        .lock-hint {
            font-size: 13px; color: var(--z-500);
            margin-bottom: 16px; line-height: 1.5;
            min-height: 20px;
        }

        .lock-field { position: relative; margin-bottom: 8px; }
        .lock-field input {
            width: 100%; padding: 12px 40px 12px 14px;
            border: 1.5px solid var(--z-200);
            border-radius: var(--r-sm);
            font-family: inherit; font-size: 15px; color: var(--z-900);
            background: var(--z-50); outline: none;
            transition: border-color .15s, box-shadow .15s;
        }
        .lock-field input.pw { letter-spacing: 5px; }
        .lock-field input.pw::placeholder { letter-spacing: 0; }
        .lock-field input:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 3px var(--blue-ring);
            background: white;
        }
        .lock-field input::placeholder { color: var(--z-400); }
        .lock-field input:disabled { opacity: .45; }
        .lock-eye {
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
            background: none; border: none; cursor: pointer;
            color: var(--z-400); font-size: 14px; padding: 4px;
            transition: color .15s; display: none; line-height: 1;
        }
        .lock-eye.on { display: block; }
        .lock-eye:hover { color: var(--z-700); }

        .lock-err  { font-size: 12px; font-weight: 500; color: var(--red); min-height: 18px; margin-bottom: 10px; text-align: left; }
        .lock-att  { font-size: 12px; color: var(--z-400); min-height: 16px; text-align: left; }

        .lock-submit {
            width: 100%; padding: 12px; margin-top: 8px; margin-bottom: 24px;
            background: var(--z-950); color: white;
            border: none; border-radius: var(--r-sm);
            font-family: inherit; font-size: 14px; font-weight: 600;
            cursor: pointer; letter-spacing: .1px;
            transition: background .15s, transform .1s;
        }
        .lock-submit:hover:not(:disabled) { background: var(--z-800); }
        .lock-submit:active:not(:disabled) { transform: scale(.99); }
        .lock-submit:disabled { opacity: .5; cursor: not-allowed; }

        .lock-actions { display: flex; justify-content: center; }
        .lock-text-btn {
            font-size: 12px; color: var(--z-400); background: none; border: none;
            cursor: pointer; font-family: inherit; text-decoration: underline;
            text-underline-offset: 2px; transition: color .15s; display: none;
            padding: 0;
        }
        .lock-text-btn:hover { color: var(--z-700); }

        /* ══════════════════════════════
           APP SHELL
        ══════════════════════════════ */
        .app { display: none; flex-direction: column; min-height: 100vh; }
        .app.show { display: flex; }

        /* Topbar */
        .bar {
            height: 52px; background: white;
            border-bottom: 1px solid var(--z-200);
            padding: 0 20px;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 100;
        }
        .bar-brand { display: flex; align-items: center; gap: 10px; }
        .bar-logo {
            width: 28px; height: 28px; border-radius: 7px; background: var(--z-950);
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 12px; flex-shrink: 0;
        }
        .bar-name { font-size: 14px; font-weight: 600; color: var(--z-900); letter-spacing: -.1px; }
        .btn-lock {
            display: flex; align-items: center; gap: 6px;
            padding: 6px 12px; border-radius: var(--r-sm);
            background: none; border: 1px solid var(--z-200);
            font-family: inherit; font-size: 12px; font-weight: 500;
            color: var(--z-500); cursor: pointer; transition: all .15s;
            box-shadow: var(--sh-xs);
        }
        .btn-lock:hover { background: var(--z-50); color: var(--red); border-color: var(--red); }

        /* Reminder ribbon */
        .ribbon {
            background: #FFFBEB; border-bottom: 1px solid #FEF3C7;
            padding: 9px 20px;
            display: none; align-items: center; gap: 10px;
        }
        .ribbon.show { display: flex; }
        .ribbon-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--amber); flex-shrink: 0; }
        .ribbon-txt { flex: 1; font-size: 13px; color: var(--z-700); }
        .ribbon-txt b { color: var(--z-900); }
        .ribbon-btn {
            padding: 4px 12px; border: none; border-radius: var(--r-xs);
            background: var(--amber); color: white;
            font-family: inherit; font-size: 12px; font-weight: 600;
            cursor: pointer; transition: background .15s; flex-shrink: 0;
        }
        .ribbon-btn:hover { background: #B45309; }
        .ribbon-x {
            background: none; border: none; cursor: pointer;
            color: var(--z-400); font-size: 15px; flex-shrink: 0; padding: 0;
        }

        /* Grid */
        .workspace {
            flex: 1; padding: 24px 20px;
            display: grid; grid-template-columns: 340px 1fr; gap: 16px;
            max-width: 1100px; margin: 0 auto; width: 100%;
            align-items: start;
        }
        @media (max-width: 820px) { .workspace { grid-template-columns: 1fr; } }

        /* Panels */
        .panel {
            background: white; border: 1px solid var(--z-200);
            border-radius: var(--r); padding: 20px;
            box-shadow: var(--sh-sm);
        }
        .panel-hd {
            font-size: 11px; font-weight: 600; color: var(--z-400);
            text-transform: uppercase; letter-spacing: .8px;
            margin-bottom: 16px;
        }

        /* Form */
        .field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
        .field-lbl { font-size: 12px; font-weight: 500; color: var(--z-500); }
        .field input[type="text"],
        .field input[type="date"],
        .field textarea {
            padding: 8px 11px;
            border: 1.5px solid var(--z-200); border-radius: var(--r-sm);
            font-family: inherit; font-size: 13px; color: var(--z-900);
            background: var(--z-50); outline: none;
            transition: border-color .15s, box-shadow .15s;
        }
        .field input:focus, .field textarea:focus {
            border-color: var(--blue); background: white;
            box-shadow: 0 0 0 3px var(--blue-faint);
        }
        .field textarea { min-height: 100px; line-height: 1.6; resize: vertical; }
        .field-sub { font-size: 11px; color: var(--z-400); margin-top: 3px; }

        .btn-add {
            width: 100%; padding: 10px; margin-top: 6px;
            background: var(--z-950); color: white;
            border: none; border-radius: var(--r-sm);
            font-family: inherit; font-size: 13px; font-weight: 600;
            cursor: pointer; transition: background .15s, transform .1s;
            display: flex; align-items: center; justify-content: center; gap: 7px;
        }
        .btn-add:hover  { background: var(--z-800); }
        .btn-add:active { transform: scale(.99); }

        /* Search */
        .search {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 11px; margin-bottom: 12px;
            background: var(--z-50); border: 1.5px solid var(--z-200);
            border-radius: var(--r-sm);
            transition: border-color .15s, box-shadow .15s;
        }
        .search:focus-within { border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-faint); }
        .search i { color: var(--z-400); font-size: 12px; flex-shrink: 0; }
        .search input {
            flex: 1; border: none; background: none; outline: none;
            font-family: inherit; font-size: 13px; color: var(--z-900);
        }
        .search input::placeholder { color: var(--z-400); }
        .search-clr {
            background: none; border: none; cursor: pointer; color: var(--z-400);
            font-size: 14px; padding: 0; display: none; transition: color .15s; line-height: 1;
        }
        .search-clr.on { display: block; }
        .search-clr:hover { color: var(--red); }
        .search-ct { font-size: 11px; color: var(--z-400); font-weight: 500; flex-shrink: 0; }

        /* Notes list */
        .nlist { overflow-y: auto; max-height: 560px; }
        .nlist::-webkit-scrollbar { width: 3px; }
        .nlist::-webkit-scrollbar-thumb { background: var(--z-200); border-radius: 3px; }

        .cat-hd {
            font-size: 10px; font-weight: 600; color: var(--z-400);
            text-transform: uppercase; letter-spacing: .9px;
            padding: 10px 4px 5px;
            display: flex; align-items: center; gap: 8px;
        }
        .cat-hd::after { content:''; flex:1; height:1px; background: var(--z-100); }

        .note-row {
            display: flex; align-items: flex-start; gap: 8px;
            padding: 10px 8px; border-radius: var(--r-sm);
            cursor: pointer; transition: background .12s;
        }
        .note-row:hover { background: var(--z-50); }
        .note-body { flex: 1; min-width: 0; }
        .note-t {
            font-size: 13px; font-weight: 600; color: var(--z-900);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            margin-bottom: 2px;
        }
        .note-p {
            font-size: 12px; color: var(--z-500); line-height: 1.4;
            overflow: hidden; text-overflow: ellipsis;
            display: -webkit-box; -webkit-line-clamp: 1; line-clamp: 1; -webkit-box-orient: vertical;
            margin-bottom: 5px;
        }
        .note-foot { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
        .note-date { font-size: 11px; color: var(--z-400); }

        .rbadge {
            font-size: 10px; font-weight: 500;
            display: inline-flex; align-items: center; gap: 3px;
            padding: 1px 6px; border-radius: 20px;
        }
        .rbadge.future  { background: #EFF6FF; color: var(--blue); }
        .rbadge.today   { background: #FFFBEB; color: var(--amber); animation: pulse 2.5s ease infinite; }
        .rbadge.overdue { background: #FEF2F2; color: var(--red); }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.45} }

        .note-del {
            background: none; border: none; cursor: pointer;
            color: var(--z-300); font-size: 12px; padding: 4px;
            border-radius: var(--r-xs); transition: all .15s;
            flex-shrink: 0; opacity: 0;
        }
        .note-row:hover .note-del { opacity: 1; }
        .note-del:hover { background: var(--red-faint); color: var(--red); }

        /* Empty state */
        .empty { text-align: center; padding: 52px 20px 40px; }
        .empty-ico { color: var(--z-300); font-size: 28px; margin-bottom: 12px; }
        .empty p { font-size: 13px; color: var(--z-400); line-height: 1.6; }

        /* Overlays */
        .overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(9,9,11,.45); z-index: 200;
            align-items: center; justify-content: center;
            backdrop-filter: blur(4px);
        }
        .overlay.show { display: flex; }

        .modal {
            background: white; border: 1px solid var(--z-200);
            border-radius: var(--r); padding: 24px;
            width: 90%; max-width: 540px; max-height: 80vh; overflow-y: auto;
            box-shadow: 0 24px 60px rgba(0,0,0,0.14);
            animation: rise .2s cubic-bezier(.22,1,.36,1);
        }
        .modal-sm { max-width: 400px; }

        .modal-hd { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; margin-bottom: 14px; }
        .modal-ttl { font-size: 16px; font-weight: 700; color: var(--z-950); letter-spacing: -.2px; }
        .modal-meta { font-size: 12px; color: var(--z-400); margin-top: 3px; display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
        .modal-x {
            width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0;
            background: var(--z-100); border: 1px solid var(--z-200);
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; color: var(--z-500); cursor: pointer; transition: all .15s;
        }
        .modal-x:hover { background: var(--red-faint); color: var(--red); border-color: var(--red); }
        .modal-body { font-size: 14px; line-height: 1.8; color: var(--z-700); white-space: pre-wrap; word-break: break-word; }
        .modal-ft { margin-top: 18px; display: flex; gap: 8px; justify-content: flex-end; }
        .btn-ghost {
            padding: 7px 14px; border-radius: var(--r-sm);
            background: none; border: 1px solid var(--z-200);
            font-family: inherit; font-size: 13px; font-weight: 500;
            color: var(--z-500); cursor: pointer; transition: all .15s;
        }
        .btn-ghost:hover { background: var(--z-50); color: var(--z-700); }
        .btn-del {
            padding: 7px 14px; border-radius: var(--r-sm);
            background: var(--red-faint); border: 1px solid rgba(220,38,38,.15);
            font-family: inherit; font-size: 13px; font-weight: 500;
            color: var(--red); cursor: pointer; transition: all .15s;
            display: flex; align-items: center; gap: 6px;
        }
        .btn-del:hover { background: var(--red); color: white; border-color: var(--red); }

        /* Reminder items */
        .rem-item {
            display: flex; gap: 10px; padding: 10px 8px;
            border-radius: var(--r-sm); margin-bottom: 4px;
            cursor: pointer; border: 1px solid var(--z-100); transition: background .12s;
        }
        .rem-item:hover { background: var(--z-50); }
        .rem-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
        .rem-item.today   .rem-dot { background: var(--amber); }
        .rem-item.overdue .rem-dot { background: var(--red); }
        .rem-t { font-size: 13px; font-weight: 600; color: var(--z-900); }
        .rem-w { font-size: 11px; color: var(--z-400); margin-top: 2px; }

        mark { background: rgba(37,99,235,.12); color: inherit; border-radius: 2px; padding: 0 1px; }
    </style>
</head>
<body>

<!-- Lock screen -->
<div class="lock-screen show" id="lockScreen">
    <div class="lock-card">
        <div class="lock-icon-wrap">
            <i class="fas fa-lock" id="lockIconEl"></i>
        </div>
        <div class="lock-title" id="lockTitle">Notes</div>
        <div class="lock-hint"  id="lockHint"></div>

        <div class="lock-field">
            <input id="lockInput" maxlength="128" placeholder=""
                   onkeydown="if(event.key==='Enter') handleLock()" />
            <button class="lock-eye" id="lockEye" type="button" onclick="togglePwd()" tabindex="-1">
                <i class="fas fa-eye" id="eyeIco"></i>
            </button>
        </div>

        <div class="lock-err" id="lockErr"></div>
        <div class="lock-att" id="lockAtt"></div>

        <button class="lock-submit" id="lockBtn" onclick="handleLock()">Continuer</button>

        <div class="lock-actions">
            <button class="lock-text-btn" id="changePwdLink" onclick="startChangePwd()">
                Changer de mot de passe
            </button>
        </div>
    </div>
</div>

<!-- App -->
<div class="app" id="appContent">

    <header class="bar">
        <div class="bar-brand">
            <div class="bar-logo"><i class="fas fa-lock"></i></div>
            <span class="bar-name">Notes</span>
        </div>
        <button class="btn-lock" onclick="lockApp()">
            <i class="fas fa-lock"></i> Verrouiller
        </button>
    </header>

    <div class="ribbon" id="ribbon">
        <div class="ribbon-dot"></div>
        <div class="ribbon-txt" id="ribbonTxt"></div>
        <button class="ribbon-btn" onclick="openRem()">Voir</button>
        <button class="ribbon-x" onclick="$('ribbon').classList.remove('show')">&times;</button>
    </div>

    <div class="workspace">

        <!-- Compose -->
        <div class="panel">
            <div class="panel-hd">Nouvelle note</div>

            <div class="field">
                <label class="field-lbl">Titre</label>
                <input type="text" id="fTitle" placeholder="Titre de la note" />
            </div>
            <div class="field">
                <label class="field-lbl">Catégorie</label>
                <input type="text" id="fCat" placeholder="Travail, Personnel, Études…" />
            </div>
            <div class="field">
                <label class="field-lbl">Contenu</label>
                <textarea id="fText" placeholder="Écrivez votre note…"></textarea>
            </div>
            <div class="field">
                <label class="field-lbl">Rappel</label>
                <input type="date" id="fDate" />
                <span class="field-sub">Affiché à chaque ouverture jusqu'à la date.</span>
            </div>

            <button class="btn-add" onclick="addNote()">
                <i class="fas fa-plus"></i> Ajouter
            </button>
        </div>

        <!-- Notes -->
        <div class="panel">
            <div class="panel-hd">Mes notes</div>

            <div class="search">
                <i class="fas fa-magnifying-glass"></i>
                <input type="text" id="searchIn" placeholder="Rechercher…"
                       oninput="onSearch()" autocomplete="off" />
                <button class="search-clr" id="searchClr" onclick="clearSrc()">&times;</button>
                <span class="search-ct" id="searchCt"></span>
            </div>

            <div class="nlist" id="nlist">
                <div class="empty">
                    <div class="empty-ico"><i class="far fa-file-alt"></i></div>
                    <p>Aucune note.<br>Créez votre première note.</p>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- Note detail -->
<div class="overlay" id="noteOv">
    <div class="modal">
        <div class="modal-hd">
            <div>
                <div class="modal-ttl"  id="mTitle"></div>
                <div class="modal-meta" id="mMeta"></div>
            </div>
            <button class="modal-x" onclick="closeNote()">&times;</button>
        </div>
        <div class="modal-body" id="mBody"></div>
        <div class="modal-ft">
            <button class="btn-del" onclick="delFromModal()">
                <i class="fas fa-trash-can"></i> Supprimer
            </button>
            <button class="btn-ghost" onclick="closeNote()">Fermer</button>
        </div>
    </div>
</div>

<!-- Reminders -->
<div class="overlay" id="remOv">
    <div class="modal modal-sm">
        <div class="modal-hd">
            <div class="modal-ttl">Rappels</div>
            <button class="modal-x" onclick="closeRem()">&times;</button>
        </div>
        <div id="remList"></div>
        <div class="modal-ft">
            <button class="btn-ghost" onclick="closeRem()">Fermer</button>
        </div>
    </div>
</div>

<script>
'use strict';

/* ── Crypto ── */
const LS_SALT      = 'ns_salt_v3';
const LS_DATA      = 'ns_data_v4';
const PBKDF2_ITER  = 100_000;
const LOCK_TIMEOUT = 5 * 60 * 1000;
const MAX_ATT      = 5;
const BLOCK_MS     = 2 * 60 * 1000;

let encKey = null, notes = [];
let lockTimer, fails = 0, blockedUntil = 0;
let state = 'unlock', tmpPwd = null;

const enc    = t => new TextEncoder().encode(t);
const dec    = b => new TextDecoder().decode(b);
const toB64  = buf => btoa(String.fromCharCode(...new Uint8Array(buf instanceof ArrayBuffer ? buf : buf.buffer)));
const fromB64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));

async function deriveKey(pw, salt) {
    const raw = await crypto.subtle.importKey('raw', enc(pw), { name:'PBKDF2' }, false, ['deriveKey']);
    return crypto.subtle.deriveKey(
        { name:'PBKDF2', salt, iterations:PBKDF2_ITER, hash:'SHA-256' },
        raw, { name:'AES-GCM', length:256 }, false, ['encrypt','decrypt']
    );
}
async function cryptEnc(data, key) {
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const ct = await crypto.subtle.encrypt({ name:'AES-GCM', iv }, key, enc(JSON.stringify(data)));
    const out = new Uint8Array(12 + ct.byteLength);
    out.set(iv); out.set(new Uint8Array(ct), 12);
    return toB64(out);
}
async function cryptDec(b64, key) {
    const buf = fromB64(b64);
    const pt  = await crypto.subtle.decrypt({ name:'AES-GCM', iv:buf.slice(0,12) }, key, buf.slice(12));
    return JSON.parse(dec(pt));
}
async function tryUnlock(pw) {
    const sb = localStorage.getItem(LS_SALT);
    if (!sb) return null;
    try {
        const key = await deriveKey(pw, fromB64(sb));
        for (const k of [LS_DATA,'ns_data_v3']) {
            const blob = localStorage.getItem(k);
            if (!blob) continue;
            const raw = await cryptDec(blob, key);
            return { key, notes: Array.isArray(raw) ? raw : (raw.notes||[]) };
        }
        return { key, notes:[] };
    } catch { return null; }
}
async function createVault(pw) {
    const salt = crypto.getRandomValues(new Uint8Array(16));
    localStorage.setItem(LS_SALT, toB64(salt));
    const key = await deriveKey(pw, salt);
    localStorage.setItem(LS_DATA, await cryptEnc([], key));
    ['notes','notes_pwd_hash_v2','ns_data_v3','ns_name'].forEach(k => localStorage.removeItem(k));
    return key;
}
async function reencrypt(pw) {
    const salt = crypto.getRandomValues(new Uint8Array(16));
    localStorage.setItem(LS_SALT, toB64(salt));
    encKey = await deriveKey(pw, salt);
    localStorage.setItem(LS_DATA, await cryptEnc(notes, encKey));
}
async function persist() {
    if (!encKey) return;
    localStorage.setItem(LS_DATA, await cryptEnc(notes, encKey));
    localStorage.removeItem('notes');
}

/* ── Lock screen ── */
const $ = id => document.getElementById(id);

function ui({ icon='fa-lock', title='Notes', hint='', btn='Continuer', err='', att='', showChange=false, pwMode=true }) {
    $('lockIconEl').className      = `fas ${icon}`;
    $('lockTitle').textContent     = title;
    $('lockHint').textContent      = hint;
    $('lockBtn').textContent       = btn;
    $('lockErr').textContent       = err;
    $('lockAtt').textContent       = att;
    $('changePwdLink').style.display = showChange ? 'inline' : 'none';
    $('lockInput').type            = pwMode ? 'password' : 'text';
    $('lockInput').className       = pwMode ? 'pw' : '';
    $('lockInput').placeholder     = pwMode ? '' : 'Votre prénom';
    $('lockInput').value           = '';
    $('lockBtn').disabled          = false;
    $('lockInput').disabled        = false;
    $('lockEye').classList.toggle('on', pwMode);
    $('eyeIco').className          = 'fas fa-eye';
    setTimeout(() => $('lockInput').focus(), 50);
}

function showLock() {
    $('lockScreen').classList.add('show');
    $('appContent').classList.remove('show');
    clearTimeout(lockTimer);
    if (!localStorage.getItem(LS_SALT)) {
        state = 'setup_1';
        ui({ icon:'fa-lock', hint:'Choisissez un mot de passe (min. 4 caractères).', btn:'Continuer' });
    } else {
        state = 'unlock';
        ui({ icon:'fa-lock', btn:'Déverrouiller', showChange:true });
    }
}

function showApp() {
    $('lockScreen').classList.remove('show');
    $('appContent').classList.add('show');
    resetTimer();
    render();
    checkRem();
}

function lockApp() {
    encKey = null; notes = [];
    clearTimeout(lockTimer);
    $('nlist').innerHTML = '';
    $('ribbon').classList.remove('show');
    if ($('searchIn')) { $('searchIn').value=''; $('searchCt').textContent=''; }
    $('searchClr')?.classList.remove('on');
    closeNote(); closeRem();
    showLock();
}

function resetTimer() {
    clearTimeout(lockTimer);
    lockTimer = setTimeout(lockApp, LOCK_TIMEOUT);
}

function setBusy(on) {
    $('lockBtn').disabled   = on;
    $('lockInput').disabled = on;
    if (on) $('lockBtn').textContent = '…';
}

async function handleLock() {
    if (Date.now() < blockedUntil) {
        $('lockErr').textContent = `Trop de tentatives — réessayez dans ${Math.ceil((blockedUntil-Date.now())/1000)} s.`;
        return;
    }
    const v = $('lockInput').value;
    if (!v.trim()) { $('lockErr').textContent = 'Champ requis.'; return; }
    setBusy(true);
    try { await dispatch(v); } finally { setBusy(false); }
}

async function dispatch(v) {
    switch (state) {
        case 'setup_1':
            if (v.length < 4) { $('lockErr').textContent = 'Minimum 4 caractères.'; return; }
            tmpPwd = v; state = 'setup_2';
            ui({ hint:'Confirmez votre mot de passe.', btn:'Créer' });
            break;

        case 'setup_2':
            if (v !== tmpPwd) {
                tmpPwd = null; state = 'setup_1';
                ui({ hint:'Choisissez un mot de passe (min. 4 caractères).', btn:'Continuer', err:'Les mots de passe ne correspondent pas.' });
                return;
            }
            encKey = await createVault(tmpPwd); notes = []; tmpPwd = null;
            showApp();
            break;

        case 'unlock': {
            const r = await tryUnlock(v);
            if (r) {
                fails = 0; encKey = r.key; notes = r.notes;
                showApp();
            } else {
                fails++;
                $('lockInput').value = '';
                if (fails >= MAX_ATT) {
                    blockedUntil = Date.now() + BLOCK_MS; fails = 0;
                    $('lockErr').textContent = 'Accès bloqué 2 minutes.';
                } else {
                    const left = MAX_ATT - fails;
                    $('lockErr').textContent = 'Mot de passe incorrect.';
                    $('lockAtt').textContent = `${left} essai${left>1?'s':''} restant${left>1?'s':''}.`;
                }
            }
            break;
        }

        case 'ch0': {
            const r = await tryUnlock(v);
            if (!r) { $('lockErr').textContent = 'Mot de passe actuel incorrect.'; $('lockInput').value=''; return; }
            notes = r.notes; state = 'ch1';
            ui({ hint:'Nouveau mot de passe (min. 4 caractères).', btn:'Continuer' });
            break;
        }
        case 'ch1':
            if (v.length < 4) { $('lockErr').textContent = 'Minimum 4 caractères.'; return; }
            tmpPwd = v; state = 'ch2';
            ui({ hint:'Confirmez le nouveau mot de passe.', btn:'Enregistrer' });
            break;

        case 'ch2':
            if (v !== tmpPwd) {
                tmpPwd = null; state = 'ch1';
                ui({ hint:'Nouveau mot de passe (min. 4 caractères).', btn:'Continuer', err:'Mots de passe différents.' });
                return;
            }
            await reencrypt(tmpPwd); tmpPwd = null;
            showApp();
            break;
    }
}

function startChangePwd() {
    state = 'ch0';
    ui({ hint:'Entrez votre mot de passe actuel.', btn:'Vérifier' });
}

function togglePwd() {
    const i = $('lockInput'), h = i.type==='password';
    i.type = h ? 'text' : 'password';
    i.className = h ? '' : 'pw';
    $('eyeIco').className = h ? 'fas fa-eye-slash' : 'fas fa-eye';
}

document.addEventListener('visibilitychange', () => { if (document.hidden) lockApp(); });
['click','keydown','mousemove','touchstart'].forEach(e =>
    document.addEventListener(e, () => { if ($('appContent').classList.contains('show')) resetTimer(); }, { passive:true })
);
showLock();

/* ── Notes ── */
let activeNoteId = null;

const esc = t => { const d=document.createElement('div'); d.textContent=t; return d.innerHTML; };

function fmtD(iso) {
    if (!iso) return '';
    if (iso.includes('-')) { const [y,m,d]=iso.split('-'); return `${d}/${m}/${y}`; }
    return iso;
}
function rSt(iso) {
    if (!iso) return null;
    const t = new Date().toISOString().split('T')[0];
    return iso < t ? 'overdue' : iso===t ? 'today' : 'future';
}
function rLbl(s) { return s==='overdue' ? 'En retard' : s==='today' ? "Aujourd'hui" : 'À venir'; }

async function addNote() {
    const title    = $('fTitle').value.trim();
    const cat      = $('fCat').value.trim() || 'Général';
    const text     = $('fText').value.trim();
    const reminder = $('fDate').value || null;
    if (!text) { $('fText').focus(); return; }
    notes.push({
        id:   Date.now(),
        title: title || text.split('\n')[0].substring(0,50) || 'Note',
        category: cat, text,
        created:  new Date().toISOString().split('T')[0],
        reminderDate: reminder
    });
    await persist();
    ['fTitle','fCat','fText','fDate'].forEach(id => $(id).value='');
    onSearch();
    $('fText').focus();
}

async function delNote(id) {
    if (!confirm('Supprimer cette note ?')) return;
    notes = notes.filter(n => n.id!==id);
    await persist();
    onSearch();
}

async function delFromModal() { await delNote(activeNoteId); closeNote(); }

function openNote(id) {
    const n = notes.find(n=>n.id===id);
    if (!n) return;
    activeNoteId = id;
    $('mTitle').textContent = n.title;
    const rs = rSt(n.reminderDate);
    const badge = rs ? `<span class="rbadge ${rs}">${fmtD(n.reminderDate)} — ${rLbl(rs)}</span>` : '';
    $('mMeta').innerHTML = `<span>${esc(n.category)}</span><span>·</span><span>${fmtD(n.created)}</span>${badge?'<span>·</span>'+badge:''}`;
    $('mBody').textContent = n.text;
    $('noteOv').classList.add('show');
}
function closeNote() { $('noteOv').classList.remove('show'); activeNoteId=null; }

/* ── Reminders ── */
function checkRem() {
    const t = new Date().toISOString().split('T')[0];
    const due = notes.filter(n=>n.reminderDate && n.reminderDate<=t);
    if (!due.length) return;
    const td = due.filter(n=>n.reminderDate===t).length;
    const ov = due.filter(n=>n.reminderDate<t).length;
    $('ribbonTxt').innerHTML = td && ov
        ? `<b>${td}</b> rappel${td>1?'s':''} aujourd'hui · <b>${ov}</b> en retard`
        : td ? `<b>${td}</b> rappel${td>1?'s':''} pour aujourd'hui`
             : `<b>${ov}</b> rappel${ov>1?'s':''} en retard`;
    $('ribbon').classList.add('show');
}

function openRem() {
    const t = new Date().toISOString().split('T')[0];
    const due = notes.filter(n=>n.reminderDate && n.reminderDate<=t);
    $('remList').innerHTML = due.map(n => {
        const s = rSt(n.reminderDate);
        return `<div class="rem-item ${s}" onclick="closeRem(); openNote(${n.id})">
            <div class="rem-dot"></div>
            <div>
                <div class="rem-t">${esc(n.title)}</div>
                <div class="rem-w">${s==='today'?"Aujourd'hui":'En retard — '+fmtD(n.reminderDate)}</div>
            </div>
        </div>`;
    }).join('');
    $('remOv').classList.add('show');
    $('ribbon').classList.remove('show');
}
function closeRem() { $('remOv').classList.remove('show'); }

/* ── Search + render ── */
function onSearch() {
    const q = $('searchIn').value.trim().toLowerCase();
    $('searchClr').classList.toggle('on', q.length>0);
    render(q);
}
function clearSrc() { $('searchIn').value=''; onSearch(); }

function hl(html, q) {
    if (!q) return html;
    return html.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'), '<mark>$1</mark>');
}

function render(q='') {
    const el = $('nlist');
    const items = q ? notes.filter(n =>
        n.title.toLowerCase().includes(q) ||
        n.text.toLowerCase().includes(q)  ||
        n.category.toLowerCase().includes(q)) : notes;

    $('searchCt').textContent = q && items.length!==notes.length ? `${items.length}/${notes.length}` : '';

    if (!items.length) {
        el.innerHTML = q
            ? `<div class="empty"><div class="empty-ico"><i class="fas fa-magnifying-glass"></i></div><p>Aucun résultat pour « ${esc(q)} »</p></div>`
            : `<div class="empty"><div class="empty-ico"><i class="far fa-file-alt"></i></div><p>Aucune note.<br>Créez votre première note.</p></div>`;
        return;
    }

    const g = {};
    items.forEach(n => { (g[n.category]??=[]).push(n); });

    el.innerHTML = Object.entries(g).map(([cat, arr]) => `
        <div class="cat-hd">${esc(cat)}</div>
        ${arr.map(n => {
            const rs = rSt(n.reminderDate);
            const b  = rs ? `<span class="rbadge ${rs}"><i class="fas fa-bell"></i> ${fmtD(n.reminderDate)}</span>` : '';
            return `<div class="note-row" onclick="openNote(${n.id})">
                <div class="note-body">
                    <div class="note-t">${hl(esc(n.title),q)}</div>
                    <div class="note-p">${hl(esc(n.text.substring(0,80)),q)}</div>
                    <div class="note-foot">
                        <span class="note-date">${fmtD(n.created)}</span>
                        ${b}
                    </div>
                </div>
                <button class="note-del" onclick="event.stopPropagation(); delNote(${n.id})" title="Supprimer">
                    <i class="fas fa-trash-can"></i>
                </button>
            </div>`;
        }).join('')}
    `).join('');
}

$('noteOv').addEventListener('click', e => { if(e.target===$('noteOv')) closeNote(); });
$('remOv').addEventListener('click',  e => { if(e.target===$('remOv'))  closeRem(); });
</script>
</body>
</html>
